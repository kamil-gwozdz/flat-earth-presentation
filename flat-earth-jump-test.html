<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE JUMP TEST - Irrefutable Flat Earth Proof</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a2e;
    color: #fff;
    font-family: 'Arial Black', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-top: 18px;
    font-size: 2.2em;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #ff4444;
    text-shadow: 0 0 20px #ff4444aa;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .subtitle {
    font-size: 0.9em;
    color: #ffcc00;
    margin: 6px 0 10px;
    letter-spacing: 2px;
  }
  .container {
    display: flex;
    gap: 40px;
    justify-content: center;
    align-items: flex-start;
    flex: 1;
  }
  .panel {
    text-align: center;
    width: 460px;
  }
  .panel-title {
    font-size: 1.1em;
    margin-bottom: 8px;
    padding: 6px 16px;
    border-radius: 8px;
    display: inline-block;
  }
  .panel:first-child .panel-title {
    background: rgba(255, 68, 68, 0.2);
    border: 2px solid #ff4444;
    color: #ff6666;
  }
  .panel:last-child .panel-title {
    background: rgba(68, 255, 68, 0.15);
    border: 2px solid #44ff44;
    color: #66ff66;
  }
  .verdict {
    font-size: 1.6em;
    margin-top: 12px;
    font-weight: 900;
    letter-spacing: 3px;
    animation: verdictIn 0.5s ease-out 6.5s both;
  }
  .panel:first-child .verdict { color: #ff4444; }
  .panel:last-child .verdict { color: #44ff44; }
  @keyframes verdictIn {
    from { transform: scale(3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .speed-label {
    font-size: 0.85em;
    color: #ff9900;
    margin-top: 4px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  .bottom-text {
    font-size: 1.5em;
    color: #ffcc00;
    padding: 10px;
    text-shadow: 0 0 15px #ffcc0088;
    animation: verdictIn 0.8s ease-out 7.5s both;
    letter-spacing: 3px;
  }
  /* stars */
  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
</style>
</head>
<body>

<canvas class="stars" id="stars"></canvas>

<h1>⚠️ The Jump Test ⚠️</h1>
<div class="subtitle">IF EARTH SPINS AT 1,670 KM/H...</div>

<div class="container">
  <!-- LEFT: Globe scenario -->
  <div class="panel">
    <div class="panel-title">🌍 ON A "SPINNING GLOBE"</div>
    <svg viewBox="0 0 460 400" width="460" height="400">
      <defs>
        <!-- ground pattern -->
        <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
          <rect width="40" height="40" fill="#1a3a1a"/>
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a5a2a" stroke-width="1"/>
        </pattern>
        <!-- arrow marker -->
        <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#ff4444"/>
        </marker>
      </defs>

      <!-- ground moving right (earth spinning under person) -->
      <g>
        <rect x="0" y="310" width="920" height="90" fill="url(#grid1)">
          <animateTransform attributeName="transform" type="translate"
            values="0,0; -460,0" dur="3s" begin="2s" fill="freeze"/>
        </rect>
      </g>
      <!-- ground line -->
      <line x1="0" y1="310" x2="460" y2="310" stroke="#44aa44" stroke-width="2"/>

      <!-- starting position marker -->
      <g opacity="0.4">
        <line x1="120" y1="310" x2="120" y2="330" stroke="#ff8888" stroke-width="2"/>
        <text x="120" y="345" text-anchor="middle" fill="#ff8888" font-size="11">START</text>
        <!-- ghost stickman -->
        <circle cx="120" cy="280" r="12" fill="none" stroke="#ff888844" stroke-width="2" stroke-dasharray="4"/>
        <line x1="120" y1="292" x2="120" y2="308" stroke="#ff888844" stroke-width="2" stroke-dasharray="4"/>
      </g>

      <!-- person jumps up, earth moves, they land far right -->
      <g>
        <!-- stickman body -->
        <g>
          <!-- vertical jump then fall -->
          <animateTransform attributeName="transform" type="translate"
            values="0,0; 0,-100; 0,0" dur="3s" begin="2s" fill="freeze"
            keyTimes="0; 0.4; 1" keySplines="0.33 1 0.68 1; 0.32 0 0.67 0" calcMode="spline"/>
          <!-- head -->
          <circle cx="120" cy="280" r="14" fill="#ffcc66" stroke="#cc9933" stroke-width="2"/>
          <!-- eyes -->
          <circle cx="115" cy="278" r="2" fill="#333"/>
          <circle cx="125" cy="278" r="2" fill="#333"/>
          <!-- surprised mouth (appears during jump) -->
          <ellipse cx="120" cy="285" rx="4" ry="3" fill="#cc3333">
            <animate attributeName="ry" values="1;5;5;3" dur="3s" begin="2s" fill="freeze"/>
          </ellipse>
          <!-- body -->
          <line x1="120" y1="294" x2="120" y2="308" stroke="#ffcc66" stroke-width="3"/>
          <!-- arms flailing -->
          <line x1="120" y1="298" x2="105" y2="288" stroke="#ffcc66" stroke-width="2.5">
            <animate attributeName="x2" values="105;95;110;100" dur="0.4s" begin="2s" repeatCount="8"/>
            <animate attributeName="y2" values="288;278;290;275" dur="0.4s" begin="2s" repeatCount="8"/>
          </line>
          <line x1="120" y1="298" x2="135" y2="288" stroke="#ffcc66" stroke-width="2.5">
            <animate attributeName="x2" values="135;145;130;140" dur="0.4s" begin="2s" repeatCount="8"/>
            <animate attributeName="y2" values="288;275;290;278" dur="0.4s" begin="2s" repeatCount="8"/>
          </line>
          <!-- legs -->
          <line x1="120" y1="308" x2="112" y2="322" stroke="#ffcc66" stroke-width="2.5">
            <animate attributeName="x2" values="112;108;115" dur="0.5s" begin="2s" repeatCount="6"/>
          </line>
          <line x1="120" y1="308" x2="128" y2="322" stroke="#ffcc66" stroke-width="2.5">
            <animate attributeName="x2" values="128;132;125" dur="0.5s" begin="2s" repeatCount="6"/>
          </line>
        </g>
      </g>

      <!-- arrow showing earth movement -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>
        <line x1="200" y1="360" x2="380" y2="360" stroke="#ff4444" stroke-width="3" marker-end="url(#arrowRed)"/>
        <text x="290" y="385" text-anchor="middle" fill="#ff4444" font-size="13" font-weight="bold">
          EARTH MOVES 1,393m
        </text>
      </g>

      <!-- landing zone label -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5s" fill="freeze"/>
        <line x1="120" y1="310" x2="120" y2="330" stroke="#44ff44" stroke-width="2"/>
        <text x="120" y="345" text-anchor="middle" fill="#44ff44" font-size="11" font-weight="bold">LANDING</text>
        <text x="280" y="290" text-anchor="middle" fill="#ff4444" font-size="16" font-weight="bold">
          🤔 SAME SPOT?!
        </text>
      </g>

      <!-- "speed" indicator -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
        <rect x="280" y="15" width="170" height="40" rx="6" fill="#ff444433" stroke="#ff4444" stroke-width="1.5"/>
        <text x="365" y="30" text-anchor="middle" fill="#ff4444" font-size="11" font-weight="bold">EARTH SPEED</text>
        <text x="365" y="47" text-anchor="middle" fill="#ffcc00" font-size="14" font-weight="bold">
          1,670 KM/H →
          <animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite"/>
        </text>
      </g>

      <!-- countdown -->
      <text x="230" y="200" text-anchor="middle" fill="#ffffff" font-size="60" font-weight="bold" opacity="0">
        3
        <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0s" fill="freeze"/>
      </text>
      <text x="230" y="200" text-anchor="middle" fill="#ffffff" font-size="60" font-weight="bold" opacity="0">
        2
        <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.7s" fill="freeze"/>
      </text>
      <text x="230" y="200" text-anchor="middle" fill="#ffcc00" font-size="60" font-weight="bold" opacity="0">
        JUMP!
        <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="1.5s" fill="freeze"/>
      </text>
    </svg>
    <div class="verdict">IMPOSSIBLE! ❌</div>
    <div class="speed-label">⚠ You should land 1.4 KM away! ⚠</div>
  </div>

  <!-- RIGHT: Flat Earth scenario -->
  <div class="panel">
    <div class="panel-title">📐 ON A FLAT EARTH</div>
    <svg viewBox="0 0 460 400" width="460" height="400">
      <defs>
        <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
          <rect width="40" height="40" fill="#1a3a1a"/>
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a5a2a" stroke-width="1"/>
        </pattern>
      </defs>

      <!-- static ground -->
      <rect x="0" y="310" width="460" height="90" fill="url(#grid2)"/>
      <line x1="0" y1="310" x2="460" y2="310" stroke="#44ff44" stroke-width="2"/>

      <!-- start marker -->
      <line x1="230" y1="310" x2="230" y2="330" stroke="#44ff44" stroke-width="2"/>
      <text x="230" y="345" text-anchor="middle" fill="#44ff44" font-size="11">START</text>

      <!-- stickman jumps and lands same spot -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 0,-100; 0,0" dur="3s" begin="2s" fill="freeze"
          keyTimes="0; 0.4; 1" keySplines="0.33 1 0.68 1; 0.32 0 0.67 0" calcMode="spline"/>
        <!-- head -->
        <circle cx="230" cy="280" r="14" fill="#ffcc66" stroke="#cc9933" stroke-width="2"/>
        <!-- eyes -->
        <circle cx="225" cy="278" r="2" fill="#333"/>
        <circle cx="235" cy="278" r="2" fill="#333"/>
        <!-- happy mouth -->
        <path d="M224,284 Q230,291 236,284" fill="none" stroke="#333" stroke-width="1.5"/>
        <!-- body -->
        <line x1="230" y1="294" x2="230" y2="308" stroke="#ffcc66" stroke-width="3"/>
        <!-- arms (casual) -->
        <line x1="230" y1="298" x2="215" y2="305" stroke="#ffcc66" stroke-width="2.5"/>
        <line x1="230" y1="298" x2="245" y2="305" stroke="#ffcc66" stroke-width="2.5"/>
        <!-- legs -->
        <line x1="230" y1="308" x2="222" y2="322" stroke="#ffcc66" stroke-width="2.5"/>
        <line x1="230" y1="308" x2="238" y2="322" stroke="#ffcc66" stroke-width="2.5"/>
      </g>

      <!-- landing marker (same spot!) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5s" fill="freeze"/>
        <text x="230" y="365" text-anchor="middle" fill="#44ff44" font-size="11" font-weight="bold">LANDING</text>
        <text x="230" y="380" text-anchor="middle" fill="#44ff44" font-size="9">(same spot ✓)</text>
      </g>

      <!-- checkmark burst -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="5.2s" fill="freeze"/>
        <text x="230" y="240" text-anchor="middle" fill="#44ff44" font-size="50">✓</text>
        <!-- rays -->
        <g stroke="#44ff4466" stroke-width="2">
          <line x1="230" y1="200" x2="230" y2="180">
            <animate attributeName="y2" values="200;170" dur="0.5s" begin="5.2s" fill="freeze"/>
          </line>
          <line x1="260" y1="210" x2="280" y2="195">
            <animate attributeName="x2" values="260;290" dur="0.5s" begin="5.2s" fill="freeze"/>
          </line>
          <line x1="200" y1="210" x2="180" y2="195">
            <animate attributeName="x2" values="200;170" dur="0.5s" begin="5.2s" fill="freeze"/>
          </line>
        </g>
      </g>

      <!-- status indicator -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
        <rect x="290" y="15" width="160" height="40" rx="6" fill="#44ff4422" stroke="#44ff44" stroke-width="1.5"/>
        <text x="370" y="30" text-anchor="middle" fill="#44ff44" font-size="11" font-weight="bold">EARTH SPEED</text>
        <text x="370" y="47" text-anchor="middle" fill="#44ff44" font-size="14" font-weight="bold">0 KM/H ✓</text>
      </g>

      <!-- countdown -->
      <text x="230" y="200" text-anchor="middle" fill="#ffffff" font-size="60" font-weight="bold" opacity="0">
        3
        <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0s" fill="freeze"/>
      </text>
      <text x="230" y="200" text-anchor="middle" fill="#ffffff" font-size="60" font-weight="bold" opacity="0">
        2
        <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.7s" fill="freeze"/>
      </text>
      <text x="230" y="200" text-anchor="middle" fill="#ffcc00" font-size="60" font-weight="bold" opacity="0">
        JUMP!
        <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="1.5s" fill="freeze"/>
      </text>
    </svg>
    <div class="verdict">MATCHES REALITY! ✅</div>
  </div>
</div>

<div class="bottom-text">🏆 FLAT EARTH CONFIRMED 🏆</div>

<script>
// starfield background
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const stars = Array.from({length: 200}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.5 + 0.3,
  a: Math.random(),
  da: (Math.random() - 0.5) * 0.02
}));
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a += s.da;
    if (s.a > 1 || s.a < 0.1) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();
window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });
</script>
</body>
</html>
